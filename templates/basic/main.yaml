# 使用 Leonardo Color Tool 生成色彩内容，重新替换为 tailwind 色彩
# 目前已停止更新，后续将使用新的色彩管理和主题配置
#
theme:
  color:
    $type: color
    transparent:
      $value: "{leonardo.global.color.transparent}"
    black:
      $value: "#000000"
    white:
      $value: "#ffffff"
    primary:
      1:
        $value: "{leonardo.global.color.corerainBlue.light.600}"
      2:
        $value: "{leonardo.global.color.corerainBlue.light.500}"
      3:
        $value: "{leonardo.global.color.corerainBlue.light.400}"
      4:
        $value: "{leonardo.global.color.corerainBlue.light.300}"
      5:
        $value: "{leonardo.global.color.corerainBlue.light.200}"
      6:
        $value: "{leonardo.global.color.corerainBlue.light.100}"
      7:
        $description: background
        $value: "{leonardo.global.color.corerainBlue.light.50}"
    secondary:
      1:
        $value: "{leonardo.global.color.deepGray.light.900}"
      2:
        $value: "{leonardo.global.color.deepGray.light.800}"
      3:
        $value: "{leonardo.global.color.deepGray.light.700}"
      4:
        $value: "{leonardo.global.color.deepGray.light.500}"
      5:
        $value: "{leonardo.global.color.deepGray.light.300}"
      6:
        $value: "{leonardo.global.color.deepGray.light.100}"
      7:
        $description: background
        $value: "{leonardo.global.color.deepGray.light.50}"
    tertiary:
      1:
        $value: "{leonardo.global.color.gray.light.600}"
      2:
        $value: "{leonardo.global.color.gray.light.500}"
      3:
        $value: "{leonardo.global.color.gray.light.400}"
      4:
        $value: "{leonardo.global.color.gray.light.300}"
      5:
        $value: "{leonardo.global.color.gray.light.200}"
      6:
        $value: "{leonardo.global.color.gray.light.100}"
      7:
        $description: background
        $value: "{leonardo.global.color.gray.light.50}"
    link:
      1:
        $value: "{leonardo.global.color.blue.light.600}"
      2:
        $value: "{leonardo.global.color.blue.light.500}"
      3:
        $value: "{leonardo.global.color.blue.light.400}"
      4:
        $value: "{leonardo.global.color.blue.light.300}"
      5:
        $value: "{leonardo.global.color.blue.light.200}"
      6:
        $value: "{leonardo.global.color.blue.light.100}"
      7:
        $description: background
        $value: "{leonardo.global.color.blue.light.50}"
    success:
      1:
        $value: "{leonardo.global.color.green.light.600}"
      2:
        $value: "{leonardo.global.color.green.light.500}"
      3:
        $value: "{leonardo.global.color.green.light.400}"
      4:
        $value: "{leonardo.global.color.green.light.300}"
      5:
        $value: "{leonardo.global.color.green.light.200}"
      6:
        $value: "{leonardo.global.color.green.light.100}"
      7:
        $description: background
        $value: "{leonardo.global.color.green.light.50}"
    danger:
      1:
        $value: "{leonardo.global.color.red.light.600}"
      2:
        $value: "{leonardo.global.color.red.light.500}"
      3:
        $value: "{leonardo.global.color.red.light.400}"
      4:
        $value: "{leonardo.global.color.red.light.300}"
      5:
        $value: "{leonardo.global.color.red.light.200}"
      6:
        $value: "{leonardo.global.color.red.light.100}"
      7:
        $description: background
        $value: "{leonardo.global.color.red.light.50}"
    warning:
      1:
        $value: "{leonardo.global.color.orange.light.600}"
      2:
        $value: "{leonardo.global.color.orange.light.500}"
      3:
        $value: "{leonardo.global.color.orange.light.400}"
      4:
        $value: "{leonardo.global.color.orange.light.300}"
      5:
        $value: "{leonardo.global.color.orange.light.200}"
      6:
        $value: "{leonardo.global.color.orange.light.100}"
      7:
        $description: background
        $value: "{leonardo.global.color.orange.light.50}"
    font:
      1:
        $value: "{leonardo.global.color.deepGray.light.950}"
      2:
        $value: "{leonardo.global.color.deepGray.light.900}"
      3:
        $value: "{leonardo.global.color.deepGray.light.700}"
      4:
        $value: "{leonardo.global.color.deepGray.light.500}"
      5:
        $value: "{leonardo.global.color.deepGray.light.400}"
      inverted:
        $value: "#ffffff"
    alpha:
      1:
        $value:
          color: "{leonardo.global.color.black}"
          alpha: "{wave.global.dimension.alpha.400}"
      2:
        $value:
          color: "{leonardo.global.color.black}"
          alpha: "{wave.global.dimension.alpha.300}"
      3:
        $value:
          color: "{leonardo.global.color.black}"
          alpha: "{wave.global.dimension.alpha.200}"
      4:
        $value:
          color: "{leonardo.global.color.black}"
          alpha: "{wave.global.dimension.alpha.100}"
      5:
        $value:
          color: "{leonardo.global.color.black}"
          alpha: 0.04
      6:
        $description: is deprecated
        $value: "{leonardo.global.color.transparent}"
        $deprecated: true
    frame:
      1:
        $value: "{leonardo.global.color.gray.light.100}"
      2:
        $description: 特殊处理；在 frame-3 基础上叠加 alpha-5 的混合色
        $value: "#EDEDED"
      3:
        $value: "{leonardo.global.color.gray.light.50}"
      # 4:
      #   $value: "{leonardo.global.color.gray.light.100}"
      # 5:
      #   $value: "{leonardo.global.color.gray.light.50}"
    border:
      1:
        $value: "{leonardo.global.color.gray.light.200}"
      2:
        $$description: 特殊处理；在 border-3 基础上叠加 alpha-5 的混合色
        $value: "#D6D6D6"
      3:
        $value: "{leonardo.global.color.gray.light.100}"
      # 4:
      #   $value: "{leonardo.global.color.gray.light.200}"
      # 5:
      #   $value: "{leonardo.global.color.gray.light.100}"
    # basic:
    #   1-background:
    #     $value: "{leonardo.global.color.white}"
    #     $deprecated: true
    #   2-black:
    #     $value: "#000000"
    #     $deprecated: true
    #   3-white:
    #     $value: "#ffffff"
    #     $deprecated: true
    background:
      body:
        $value: "{leonardo.global.color.deepGray.light.100}"
      container:
        $value: "{leonardo.global.color.white}"
