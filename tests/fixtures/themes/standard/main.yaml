theme:
  color:
    $type: color
    primary:
      $value: "{tailwindcss4.color.indigo.600}"
      $description: "主品牌色"
    secondary:
      $value: "{tailwindcss4.color.blue.500}"
    text:
      default:
        $value: "{tailwindcss4.color.gray.900}"
      muted:
        $value:
          color: "{tailwindcss4.color.gray.600}"
          alpha: 0.6
  style:
    shadow:
      $type: shadow
      sm:
        $value:
          - color: "#000000"
            alpha: 0.1
            offsetX: 0
            offsetY: 1
            blur: 2
            spread: 0
      md:
        $value:
          - color:
              $ref: "#/tailwindcss4/color/gray/900/$value"
              alpha: 0.15
            offsetX: 0
            offsetY: 4
            blur: 6
            spread: 0
  dimension:
    $type: dimension
    alpha:
      sm:
        $value: "{wave.dimension.alpha.200}"
      md:
        $value: "{wave.dimension.alpha.400}"
      lg:
        $value: "{wave.dimension.alpha.600}"
